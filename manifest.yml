display_information:
  name: op-link-fixer
  description: Replies to 1Password private links with the onepassword:// deep link
  background_color: "#1a285f"
features:
  bot_user:
    display_name: op-link-fixer
    always_online: true
oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:join
      - channels:read
      - groups:history
      - im:history
      - mpim:history
      - chat:write
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
